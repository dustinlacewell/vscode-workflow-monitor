name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Typecheck & Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm run build

  package:
    name: Package VSIX
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      # Use our wrapper so .build/ is created as a directory before vsce
      # writes into it — otherwise vsce treats a missing `--out` path as a
      # filename and the artifact glob can't find .build/*.vsix.
      - run: npm run package
      - uses: actions/upload-artifact@v4
        with:
          name: vsix
          path: .build/*.vsix
          if-no-files-found: error
